<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refugia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --rg-page:    #eae6db;
    --rg-sidebar: #f3f0e8;
    --rg-surface: #f7f5ef;
    --rg-card:    #ffffff;
    --rg-border:     rgba(70,58,36,0.08);
    --rg-border-mid: rgba(70,58,36,0.14);
    --rg-border-str: rgba(70,58,36,0.24);
    --rg-text:   #141008;
    --rg-text-2: #4a3f30;
    --rg-text-3: #8c7d66;
    --rg-text-4: #b5a68d;
    --rg-green:    #1d5a2e;
    --rg-green-h:  #164a24;
    --rg-green-2:  #2e8045;
    --rg-green-bg: #e2f0e7;
    --rg-green-bd: rgba(29,90,46,0.18);
    --rg-amber:    #6e4508;
    --rg-amber-bg: #fbefda;
    --rg-red:      #6e2020;
    --rg-red-bg:   #f7e5e5;
    --rg-blue:     #14406e;
    --rg-blue-bg:  #e0ebf5;
    --shadow-xs:    0 1px 2px rgba(20,16,8,0.04);
    --shadow-card:  0 1px 3px rgba(20,16,8,0.05), 0 4px 12px rgba(20,16,8,0.03);
    --shadow-raise: 0 8px 24px rgba(20,16,8,0.08), 0 2px 6px rgba(20,16,8,0.04);
    --shadow-float: 0 16px 48px rgba(20,16,8,0.10), 0 4px 12px rgba(20,16,8,0.05);
    --shadow-btn:   0 1px 3px rgba(20,16,8,0.12), inset 0 1px 0 rgba(255,255,255,0.10);
    --shadow-input: inset 0 1px 2px rgba(20,16,8,0.05);
    --rg-mono:  'DM Mono', monospace;
    --rg-serif: 'Fraunces', Georgia, serif;
    --rg-radius: 12px;
    --rg-radius-sm: 8px;
    --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: var(--rg-mono); background: var(--rg-page); color: var(--rg-text); font-size: 13px; -webkit-font-smoothing: antialiased; }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 9999; pointer-events: none;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  .shell { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar { width: 220px; background: var(--rg-sidebar); border-right: 1px solid var(--rg-border); display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 10; }
  .sidebar::after { content: ''; position: absolute; top: 0; right: -1px; bottom: 0; width: 1px; background: linear-gradient(to bottom, rgba(70,58,36,0.06), rgba(70,58,36,0.12), rgba(70,58,36,0.06)); }
  .sidebar-logo { padding: 26px 22px 22px; position: relative; }
  .sidebar-logo::after { content:''; position:absolute; bottom:0; left:22px; right:22px; height:1px; background:linear-gradient(90deg, var(--rg-border-mid), transparent); }
  .logo-mark { font-family: var(--rg-serif); font-weight: 700; font-size: 22px; color: var(--rg-green); letter-spacing: -0.04em; line-height: 1.05; }
  .logo-sub { font-size: 8px; color: var(--rg-text-4); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 5px; font-weight: 500; }
  .nav { padding: 14px 0; flex: 1; overflow-y: auto; }
  .nav-section-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rg-text-4); padding: 14px 22px 6px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; margin: 2px 10px; cursor: pointer; color: var(--rg-text-3); font-size: 12px; letter-spacing: 0.01em; border-radius: var(--rg-radius-sm); user-select: none; transition: all 0.15s var(--ease-out-expo); position: relative; }
  .nav-item:hover { background: rgba(29,90,46,0.05); color: var(--rg-text-2); }
  .nav-item.active { color: var(--rg-green); background: var(--rg-green-bg); font-weight: 500; box-shadow: 0 1px 3px rgba(29,90,46,0.08), inset 0 0 0 1px var(--rg-green-bd); }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.5; }
  .nav-item.active .nav-icon { opacity: 0.85; }
  .nav-divider { height: 1px; background: var(--rg-border); margin: 8px 22px; }
  .nav-item-sub { font-size: 10.5px; color: var(--rg-text-4); margin-top: 1px; }
  .nav-item .status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--rg-green); flex-shrink:0; margin-left: auto; }
  .nav-item .status-dot.running { background: var(--rg-blue); animation: pulse 2s ease-in-out infinite; }
  .nav-item .status-dot.failed { background: var(--rg-red); }
  .sidebar-footer { padding: 12px 18px; border-top: 1px solid var(--rg-border); background: rgba(234,230,219,0.5); }
  .usage-mini { margin-bottom: 10px; }
  .usage-mini-label { font-size: 9.5px; color: var(--rg-text-4); letter-spacing: 0.06em; margin-bottom: 5px; display: flex; justify-content: space-between; }
  .usage-mini-bar { height: 3px; background: var(--rg-border-mid); border-radius: 2px; overflow: hidden; }
  .usage-mini-fill { height: 100%; background: linear-gradient(90deg, var(--rg-green-2), var(--rg-green)); border-radius: 2px; }
  .org-badge { display: flex; align-items: center; gap: 10px; }
  .org-avatar { width: 32px; height: 32px; border-radius: var(--rg-radius-sm); background: linear-gradient(135deg, var(--rg-green), var(--rg-green-2)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: #fff; flex-shrink: 0; box-shadow: 0 2px 8px rgba(29,90,46,0.3), inset 0 1px 0 rgba(255,255,255,0.15); }
  .org-name { font-size: 12px; color: var(--rg-text-2); font-weight: 500; }
  .org-plan { font-size: 10px; color: var(--rg-text-4); margin-top: 2px; }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .topbar { padding: 14px 32px; border-bottom: 1px solid var(--rg-border); background: rgba(247,245,239,0.75); backdrop-filter: blur(16px) saturate(1.4); display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-shrink: 0; position: relative; z-index: 5; }
  .topbar::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, var(--rg-border-mid), transparent); }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .page-title { font-family: var(--rg-serif); font-weight: 500; font-size: 20px; color: var(--rg-text); letter-spacing: -0.03em; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .content-area { flex: 1; overflow-y: auto; padding: 32px; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 7px 16px; border-radius: var(--rg-radius-sm); font-family: var(--rg-mono); font-size: 12px; cursor: pointer; border: 1px solid var(--rg-border-mid); background: var(--rg-card); color: var(--rg-text-2); transition: all 0.18s var(--ease-out-expo); user-select: none; box-shadow: var(--shadow-xs); white-space: nowrap; }
  .btn:hover { background: var(--rg-surface); border-color: var(--rg-border-str); color: var(--rg-text); box-shadow: var(--shadow-card); transform: translateY(-1px); }
  .btn:active { transform: translateY(0); box-shadow: var(--shadow-xs); transition-duration: 0.06s; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-primary { background: linear-gradient(to bottom, var(--rg-green-2), var(--rg-green)); color: #fff; border-color: var(--rg-green-h); box-shadow: var(--shadow-btn), 0 2px 8px rgba(29,90,46,0.2); font-weight: 500; }
  .btn-primary:hover { background: linear-gradient(to bottom, var(--rg-green), var(--rg-green-h)); border-color: var(--rg-green-h); color: #fff; box-shadow: var(--shadow-btn), 0 4px 16px rgba(29,90,46,0.3); transform: translateY(-1px); }
  .btn-primary:active { box-shadow: var(--shadow-btn); transform: translateY(0); }
  .btn-sm { padding: 5px 11px; font-size: 11px; border-radius: 6px; }
  .btn-pdf { background: var(--rg-green-bg); color: var(--rg-green); border-color: var(--rg-green-bd); font-weight: 500; }
  .btn-pdf:hover { background: var(--rg-green); color: #fff; border-color: var(--rg-green-h); }

  /* ── Cards ── */
  .card { background: var(--rg-card); border: 1px solid var(--rg-border); border-radius: var(--rg-radius); padding: 22px; box-shadow: var(--shadow-card); }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: 0.01em; border: 1px solid transparent; }
  .badge-running  { background: var(--rg-blue-bg);  color: var(--rg-blue);  border-color: rgba(20,64,110,0.12); }
  .badge-complete { background: var(--rg-green-bg); color: var(--rg-green); border-color: var(--rg-green-bd); }
  .badge-failed   { background: var(--rg-red-bg);   color: var(--rg-red);   border-color: rgba(110,32,32,0.12); }
  .badge-pending  { background: var(--rg-amber-bg); color: var(--rg-amber); border-color: rgba(110,69,8,0.12); }
  .badge-demo     { background: #f0eaf8; color: #5a2d8c; border-color: rgba(90,45,140,0.18); font-size: 9.5px; padding: 3px 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; display: inline-block; }
  .dot-pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.25;transform:scale(0.7)} }

  .css-spinner { width: 14px; height: 14px; border: 2px solid rgba(20,64,110,0.15); border-top-color: var(--rg-blue); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; flex-shrink: 0; }
  .css-spinner-green { width: 18px; height: 18px; border: 2px solid rgba(29,90,46,0.15); border-top-color: var(--rg-green); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; flex-shrink: 0; }
  .css-spinner-sm { width: 13px; height: 13px; border-width: 1.5px; }
  @keyframes spin { from{transform:rotate(0deg)}to{transform:rotate(360deg)} }

  /* ── Dashboard ── */
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 26px; }
  .metric-card { background: var(--rg-card); border: 1px solid var(--rg-border); border-radius: var(--rg-radius); padding: 22px 24px; box-shadow: var(--shadow-card); position: relative; overflow: hidden; transition: all 0.22s var(--ease-out-expo); }
  .metric-card:hover { box-shadow: var(--shadow-raise); transform: translateY(-2px); }
  .metric-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--rg-border); }
  .metric-card.accent-green::before { background: linear-gradient(90deg, var(--rg-green), var(--rg-green-2)); }
  .metric-card.accent-blue::before  { background: linear-gradient(90deg, var(--rg-blue), #3a7abf); }
  .metric-card.accent-amber::before { background: linear-gradient(90deg, #c7a050, #a07830); }
  .metric-label { font-size: 10px; color: var(--rg-text-3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .metric-value { font-family: var(--rg-serif); font-size: 34px; color: var(--rg-text); font-weight: 500; letter-spacing: -0.04em; line-height: 1; font-variant-numeric: tabular-nums; }
  .metric-sub { font-size: 10.5px; color: var(--rg-text-4); margin-top: 6px; }
  .metric-trend { font-size: 10px; color: var(--rg-green); margin-top: 4px; font-weight: 500; }
  .metric-alert { font-size: 10px; color: var(--rg-amber); margin-top: 4px; font-weight: 500; }
  .insight-bar { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--rg-border); }
  .insight-bar:last-child { border-bottom: none; }
  .insight-species { font-size: 12px; color: var(--rg-text); font-weight: 500; flex: 1; }
  .insight-sci { font-size: 10px; color: var(--rg-text-4); font-style: italic; }
  .insight-metric { font-family: var(--rg-serif); font-size: 16px; font-weight: 500; width: 52px; text-align: right; font-variant-numeric: tabular-nums; }
  .insight-bar-bg { flex: 1; height: 4px; background: var(--rg-border-mid); border-radius: 2px; overflow: hidden; }
  .insight-fill { height: 100%; border-radius: 2px; }
  .flag-low { color: var(--rg-red); }
  .flag-mid { color: var(--rg-amber); }
  .flag-ok  { color: var(--rg-green); }
  .table-card { background: var(--rg-card); border: 1px solid var(--rg-border); border-radius: var(--rg-radius); overflow: hidden; box-shadow: var(--shadow-card); }
  .table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--rg-border); background: var(--rg-surface); }
  .table-title { font-family: var(--rg-serif); font-size: 15px; font-weight: 500; color: var(--rg-text); letter-spacing: -0.02em; }
  .job-table { width: 100%; border-collapse: collapse; }
  .job-table thead tr { background: var(--rg-surface); border-bottom: 1px solid var(--rg-border); }
  .job-table th { text-align: left; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--rg-text-4); padding: 11px 16px; font-weight: 400; }
  .job-table td { padding: 14px 16px; font-size: 12px; border-bottom: 1px solid var(--rg-border); color: var(--rg-text-2); vertical-align: middle; transition: background 0.12s; }
  .job-table tr:last-child td { border-bottom: none; }
  .job-table tbody tr { cursor: pointer; position: relative; }
  .job-table tbody tr::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background: linear-gradient(to bottom, var(--rg-green-2), var(--rg-green)); opacity:0; transition:opacity 0.15s; border-radius: 0 2px 2px 0; }
  .job-table tbody tr:hover::before { opacity: 1; }
  .job-table tbody tr:hover td { background: rgba(247,245,239,0.7); }
  .job-name { font-weight: 500; color: var(--rg-text); font-size: 13px; font-family: var(--rg-serif); letter-spacing: -0.01em; }
  .job-meta { font-size: 10.5px; color: var(--rg-text-4); margin-top: 2px; font-style: italic; }
  .pbar-wrap { background: var(--rg-page); border-radius: 5px; height: 7px; width: 96px; overflow: hidden; display: inline-block; box-shadow: inset 0 1px 2px rgba(20,16,8,0.06); }
  .pbar-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, var(--rg-green-2), var(--rg-green)); transition: width 0.5s var(--ease-out-expo); position: relative; }
  .pbar-fill.pbar-blue { background: linear-gradient(90deg, #3a7abf, var(--rg-blue)); }
  .pbar-fill.pbar-active::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%); animation: shimmer 1.8s infinite; }
  @keyframes shimmer { 0%{transform:translateX(-100%)}100%{transform:translateX(100%)} }

  /* ── Demo Banner ── */
  .demo-banner { background: linear-gradient(135deg, #173f22 0%, #1d5a2e 60%, #2a6e40 100%); border-radius: var(--rg-radius); padding: 22px 28px; display: flex; align-items: center; gap: 20px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(29,90,46,0.25), inset 0 1px 0 rgba(255,255,255,0.08); position: relative; overflow: hidden; }
  .demo-banner::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.35'/%3E%3C/svg%3E"); background-size: 200px; opacity: 0.12; pointer-events: none; }
  .demo-banner-icon { font-size: 42px; flex-shrink: 0; position: relative; z-index: 1; line-height: 1; }
  .demo-banner-content { flex: 1; position: relative; z-index: 1; }
  .demo-banner-title { font-family: var(--rg-serif); font-size: 18px; font-weight: 400; color: #fff; letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.2; }
  .demo-banner-sub { font-size: 11.5px; color: rgba(255,255,255,0.72); line-height: 1.65; margin-bottom: 14px; }
  .demo-banner-cta { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.28); color: #fff; font-family: var(--rg-mono); font-size: 12px; font-weight: 500; padding: 8px 18px; border-radius: 7px; cursor: pointer; transition: all 0.18s var(--ease-out-expo); }
  .demo-banner-cta:hover { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.4); transform: translateY(-1px); }
  .demo-banner-dismiss { position: absolute; top: 14px; right: 16px; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 16px; z-index: 1; transition: color 0.12s; line-height: 1; }
  .demo-banner-dismiss:hover { color: rgba(255,255,255,0.8); }

  /* ── Wizard ── */
  .wizard-steps { display: flex; align-items: center; margin-bottom: 32px; }
  .wizard-step  { display: flex; align-items: center; gap: 10px; }
  .step-num { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--rg-border-mid); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--rg-text-4); flex-shrink: 0; background: var(--rg-card); box-shadow: var(--shadow-xs); transition: all 0.25s var(--ease-out-expo); }
  .step-num.active { background: linear-gradient(to bottom, var(--rg-green-2), var(--rg-green)); color: #fff; border-color: var(--rg-green-h); font-weight: 500; box-shadow: 0 0 0 5px rgba(29,90,46,0.10), 0 2px 8px rgba(29,90,46,0.25); }
  .step-num.done { background: var(--rg-green-bg); color: var(--rg-green); border-color: var(--rg-green-bd); font-size: 13px; }
  .step-label { font-size: 11px; color: var(--rg-text-4); white-space: nowrap; transition: color 0.15s; }
  .step-label.active { color: var(--rg-text-2); font-weight: 500; }
  .step-connector { flex: 1; height: 2px; background: var(--rg-border-mid); margin: 0 10px; min-width: 18px; max-width: 48px; border-radius: 1px; position: relative; overflow: hidden; }
  .step-connector.done::after { content:''; position:absolute; inset:0; background: linear-gradient(90deg, var(--rg-green-2), var(--rg-green)); border-radius:1px; }

  /* ── Dropzone ── */
  .dropzone { border: 1.5px dashed var(--rg-border-str); border-radius: var(--rg-radius); padding: 56px 32px; text-align: center; background: var(--rg-surface); cursor: pointer; transition: all 0.2s var(--ease-out-expo); position: relative; overflow: hidden; }
  .dropzone::before { content:''; position:absolute; inset:0; background-image: radial-gradient(circle at 1px 1px, rgba(70,58,36,0.05) 1px, transparent 0); background-size: 20px 20px; pointer-events:none; }
  .dropzone:hover { border-color: var(--rg-green-2); background: var(--rg-green-bg); box-shadow: 0 0 0 4px rgba(29,90,46,0.06); }
  .dropzone-icon { width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--rg-green-bg), rgba(29,90,46,0.08)); border: 1px solid var(--rg-green-bd); display: inline-flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 18px; position: relative; z-index: 1; box-shadow: 0 2px 8px rgba(29,90,46,0.1); }
  .dropzone-title { font-family: var(--rg-serif); font-size: 18px; color: var(--rg-text); margin-bottom: 8px; font-weight: 500; position: relative; z-index: 1; letter-spacing: -0.02em; }
  .dropzone-sub { font-size: 12px; color: var(--rg-text-3); line-height: 1.6; margin-bottom: 14px; position: relative; z-index: 1; }
  .dropzone-tag { display: inline-block; margin: 3px; padding: 4px 10px; background: var(--rg-card); border: 1px solid var(--rg-border-mid); border-radius: 5px; font-size: 10px; color: var(--rg-text-3); box-shadow: var(--shadow-xs); position: relative; z-index: 1; font-weight: 500; }

  /* ── Form ── */
  .field-group { margin-bottom: 22px; }
  .field-label { font-size: 11px; color: var(--rg-text-2); margin-bottom: 8px; letter-spacing: 0.03em; display: block; font-weight: 500; }
  .field-input { width: 100%; padding: 10px 14px; border: 1px solid var(--rg-border-mid); border-radius: var(--rg-radius-sm); font-family: var(--rg-mono); font-size: 12.5px; color: var(--rg-text); background: var(--rg-card); outline: none; transition: border-color 0.15s, box-shadow 0.15s; box-shadow: var(--shadow-input); }
  .field-input:focus { border-color: var(--rg-green-2); box-shadow: 0 0 0 4px rgba(29,90,46,0.08), var(--shadow-input); }
  .field-input::placeholder { color: var(--rg-text-4); }
  .field-hint { font-size: 10px; color: var(--rg-text-4); margin-top: 6px; }
  .field-hint.hint-context { color: var(--rg-green); font-weight: 500; }

function badge(status,step){
  const sl=step.replace(/_/g,' ');
  if(status==='running') return`<span class="badge badge-running"><span class="dot dot-pulse"></span>Running — ${sl}</span>`;
  if(status==='complete')return`<span class="badge badge-complete"><span class="dot"></span>Complete</span>`;
  if(status==='failed')  return`<span class="badge badge-failed"><span class="dot"></span>Failed — ${sl}</span>`;
  return`<span class="badge badge-pending"><span class="dot"></span>Queued</span>`;
}

function svgPCA(){
  const clusters = [
    {pop:'Y_N', cx:62, cy:55, spread:12, n:12, col:'#1d5a2e'},

  let dots='';
  const rng=(seed)=>{let s=seed*9301+49297;return(s%233280)/233280;};
  clusters.forEach((c,ci)=>{

function svgFST(){
  const pops=['Y_N','Y_S','I_W','C_OR'];
  const fst=[[0,0.048,0.121,0.143],[0.048,0,0.118,0.140],[0.121,0.118,0,0.062],[0.143,0.140,0.062,0]];
  const cellSize=42,off=36;
  let cells='',vals='',rowLabels='',colLabels='';
  pops.forEach((p,i)=>{
    rowLabels+=`<text x="${off-4}" y="${off+i*cellSize+cellSize/2+4}" text-anchor="end" font-size="8" fill="#4a3f30" font-family="DM Mono,monospace">${p}</text>`;
    colLabels+=`<text x="${off+i*cellSize+cellSize/2}" y="${off-8}" text-anchor="middle" font-size="8" fill="#4a3f30" font-family="DM Mono,monospace">${p}</text>`;
    fst[i].forEach((v,j)=>{
      const alpha=i===j?0.06:Math.min(v/0.16,1);
      const r=i===j?235:Math.round(29+(200-29)*(1-alpha));
      const g=i===j?240:Math.round(90+(220-90)*(1-alpha));
      const b=i===j?240:Math.round(46+(220-46)*(1-alpha));
      cells+=`<rect x="${off+j*cellSize}" y="${off+i*cellSize}" width="${cellSize}" height="${cellSize}" fill="rgb(${r},${g},${b})" stroke="white" stroke-width="1.5" rx="2"/>`;
      if(i!==j){vals+=`<text x="${off+j*cellSize+cellSize/2}" y="${off+i*cellSize+cellSize/2+4}" text-anchor="middle" font-size="8.5" fill="${v>0.1?'#fff':'#1d5a2e'}" font-weight="500" font-family="DM Mono,monospace">${v.toFixed(3)}</text>`;}
    });
  });
  return`<svg viewBox="0 0 210 210" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;background:#f7f5ef">
    ${cells}${vals}${rowLabels}${colLabels}
    <text x="105" y="204" text-anchor="middle" font-size="7.5" fill="#b5a68d" font-family="DM Mono,monospace">Weir-Cockerham FST</text>
  </svg>`;
}

    ${bars}${lbs}${vls}
    <text x="100" y="114" text-anchor="middle" font-size="7.5" fill="#b5a68d" font-family="DM Mono,monospace">FROH (inbreeding coefficient)</text>

}

    <div class="field-group">
      <label class="field-label">Scientific name</label>
      <input class="field-input" type="text" value="${state.sciName}" placeholder="e.g. Canis lupus" oninput="state.sciName=this.value"/>
    </div>
    <div class="field-group">
      <label class="field-label">Study description</label>
      <textarea class="field-input" rows="3" placeholder="Brief description of this analysis and its goals…" oninput="state.description=this.value">${state.description}</textarea>
    </div>`;}
  else if(s===3){
    const selCount=state.selectedSamples.size;
    body=`
    <div class="popmap-toolbar">
      <label class="popmap-select-all">
        <input type="checkbox" ${selCount===ALL_SAMPLES.length?'checked':''} onchange="toggleAllSamples(this.checked)"/>
        Select all 48 samples
      </label>
      <div style="flex:1"></div>
      <button class="btn btn-sm" onclick="showToast('CSV template downloading…')">↓ CSV template</button>
      <label class="btn btn-sm" style="cursor:pointer">↑ Import CSV<input type="file" accept=".csv" style="display:none" onchange="showToast('CSV imported — 48 labels applied')"/></label>
    </div>
    <div class="popmap-bulk-row ${selCount>0?'visible':''}">
      <span style="font-size:11.5px;font-weight:500;color:var(--rg-green)">${selCount} sample${selCount!==1?'s':''} selected</span>
      <span style="font-size:11px;color:var(--rg-text-3)">Assign to:</span>
      <select class="pop-select" onchange="bulkAssign(this.value);this.value=''">
        <option value="">Choose population…</option>
        ${POPS.map(p=>`<option>${p}</option>`).join('')}
        <option value="__new__">+ Create new population</option>
      </select>
      <button class="btn btn-sm" onclick="state.selectedSamples.clear();render()">Clear</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden;max-height:320px;overflow-y:auto">
      <table class="popmap-table">
        <thead><tr>
          <th style="width:36px"><input type="checkbox" onchange="toggleAllSamples(this.checked)"/></th>
          <th>Sample ID</th><th>Population</th><th>Source</th>
        </tr></thead>
        <tbody>${ALL_SAMPLES.map((smp,idx)=>{
          const sel=state.selectedSamples.has(smp);
          return`<tr class="${sel?'selected':''}">
            <td><input type="checkbox" ${sel?'checked':''} onchange="toggleSample('${smp}',this.checked)"/></td>
            <td style="font-family:var(--rg-mono);color:var(--rg-text-2)">${smp}</td>
            <td><select class="pop-select" onchange="popMap['${smp}']=this.value">${POPS.map(p=>`<option ${popMap[smp]===p?'selected':''}>${p}</option>`).join('')}</select></td>
            <td><span style="font-size:10px;color:${idx<12?'var(--rg-green)':'var(--rg-text-4)'};background:${idx<12?'var(--rg-green-bg)':'var(--rg-surface)'};padding:3px 8px;border-radius:4px;border:1px solid ${idx<12?'var(--rg-green-bd)':'var(--rg-border)'};font-weight:500">${idx<12?'matched':'manual'}</span></td>
          </tr>`;}).join('')}
        </tbody>
      </table>
    </div>
    <p style="font-size:11px;color:var(--rg-green);margin-top:14px;font-weight:500">✓ All 48 samples labeled · 4 populations defined</p>`;}
  else if(s===4){
    const sampleCount=48;
    body=`
    ${sampleCount<100?`<div class="param-context">
      ⚑ <strong>Small dataset note:</strong> At ${sampleCount} samples, default MAF 0.05 may remove too many variants. Consider MAF 0.01–0.03 for endangered or low-diversity populations.
    </div>`:''}
    <span class="section-label">Standard parameters</span>
    <div class="params-grid">
      <div class="field-group">
        <label class="field-label">MAF threshold</label>
        <input class="field-input" type="number" value="${state.maf}" step="0.01" min="0.01" max="0.2" oninput="state.maf=this.value"/>
        <div class="field-hint"><span style="color:var(--rg-green)">Recommended 0.01–0.03 for &lt;100 samples</span></div>
      </div>
      <div class="field-group">
        <label class="field-label">ADMIXTURE K range</label>
        <div style="display:flex;gap:8px">
          <input class="field-input" type="number" value="${state.kMin}" min="2" max="5" style="flex:1" oninput="state.kMin=this.value" placeholder="min"/>
          <input class="field-input" type="number" value="${state.kMax}" min="3" max="15" style="flex:1" oninput="state.kMax=this.value" placeholder="max"/>
        </div>
        <div class="field-hint">K range tested via CV · higher K = longer runtime</div>
      </div>
      <div class="field-group">
        <label class="field-label">LD window / step / r²</label>
        <div style="display:flex;gap:6px">
          <input class="field-input" type="number" value="${state.ldWindow}" style="flex:1" oninput="state.ldWindow=this.value"/>
          <input class="field-input" type="number" value="${state.ldStep}" style="flex:1" oninput="state.ldStep=this.value"/>
          <input class="field-input" type="number" value="${state.ldR2}" step="0.01" style="flex:1" oninput="state.ldR2=this.value"/>
        </div>
        <div class="field-hint">PLINK2 --indep-pairwise · default adequate for wolves</div>
      </div>
    </div>
    <div style="margin-top:4px;padding-top:16px;border-top:1px solid var(--rg-border)">
      <span class="section-label">Advanced parameters</span>
      <div class="adv-always">
        <div class="field-group" style="margin-bottom:0">
          <label class="field-label">ADMIXTURE CV folds</label>
          <input class="field-input" type="number" value="10"/>
          <div class="field-hint">10 recommended for ≥30 samples</div>
        </div>
        <div class="field-group" style="margin-bottom:0">
          <label class="field-label">PCA components</label>
          <input class="field-input" type="number" value="10"/>
        </div>
        <div class="field-group" style="margin-bottom:0">
          <label class="field-label">ROH min length (kb)</label>
          <input class="field-input" type="number" value="1000"/>
          <div class="field-hint">1000 kb = 1 Mb · recent inbreeding</div>
        </div>
      </div>
    </div>`;}
  else if(s===5){
    const sp=state.species||'Gray Wolf',sc=state.sciName||'Canis lupus';
    body=`
    <span class="section-label">Analysis summary</span>
    ${[['VCF file','schweizer_wolves_n48.vcf.gz'],
       ['Species',`${sp} — ${sc}`],
       ['Samples','48 across 4 populations'],
       ['Parameters',`MAF ${state.maf} · LD ${state.ldWindow}/${state.ldStep}/${state.ldR2} · K ${state.kMin}–${state.kMax}`],
       ['CV folds / PCA components','10 / 10'],
       ['Estimated runtime','8–22 min · Celery worker on Hetzner CPX41'],
       ['Output','PDF report + figures + explainability + quality score → Supabase Storage'],
      ].map(([k,v])=>`<div class="review-row"><span class="review-key">${k}</span><span class="review-val">${v}</span></div>`).join('')}
    <div style="margin-top:18px;padding:12px 16px;background:var(--rg-amber-bg);border:1px solid rgba(110,69,8,0.16);border-radius:var(--rg-radius-sm);font-size:11px;color:var(--rg-amber);line-height:1.6">
      ⚑ This will use <strong>1 of your remaining 16 jobs</strong> this month (4 used of 20 included). Resets May 1.
    </div>`;}

  return`
    <div class="topbar">
      <div class="topbar-left">
        <button class="btn btn-sm" onclick="navigate('dashboard','nav-dashboard')">← Dashboard</button>
        <div class="page-title">New Analysis</div>
      </div>
    </div>
    <div class="content-area page-enter">
      <div style="max-width:700px">
        ${wizard}
        <div class="card">
          ${body}
          <div style="display:flex;justify-content:space-between;align-items:center;padding-top:20px;margin-top:24px;border-top:1px solid var(--rg-border)">
            ${s>1?`<button class="btn" onclick="state.uploadStep--;render()">← Back</button>`:'<div></div>'}
            <button class="btn btn-primary" onclick="nextStep()">${s===5?'🧬 Launch Analysis':'Continue →'}</button>
          </div>
        </div>
      </div>
    </div>`;}

function renderSettings(){
  const members=[
    {initials:'KR',name:'Kira Rasmussen',email:'kira@refugia.io',role:'Admin',bg:'linear-gradient(135deg,var(--rg-green),var(--rg-green-2))',tc:'#fff'},
    {initials:'TM',name:'Tom Marchetti',email:'tom@refugia.io',role:'Analyst',bg:'linear-gradient(135deg,#1a4e80,#2a6eaa)',tc:'#fff'},
    {initials:'SR',name:'Sara Reyes',email:'sara@refugia.io',role:'Viewer',bg:'linear-gradient(135deg,#6a5530,#8a7550)',tc:'#fff'},
  ];
  return`
    <div class="topbar">
      <div class="topbar-left"><div class="page-title">Settings</div></div>
    </div>
    <div class="content-area page-enter">
      <div style="max-width:660px">
        <div style="margin-bottom:34px">
          <div class="settings-title">Usage &amp; Plan</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:14px">
            <div class="metric-card accent-amber">
              <div class="metric-label">Jobs this month</div>
              <div class="metric-value" style="color:var(--rg-amber)">4</div>
              <div class="metric-sub">of 20 included</div>
              <div class="metric-alert">Resets May 1</div>
            </div>
            <div class="metric-card">
              <div class="metric-label">Storage used</div>
              <div class="metric-value">1.4</div>
              <div class="metric-sub">GB of 50 GB</div>
            </div>
            <div class="metric-card accent-green">
              <div class="metric-label">Plan</div>
              <div class="metric-value" style="font-size:22px;color:var(--rg-green)">Pro</div>
              <div class="metric-sub">$79 / month</div>
            </div>
          </div>
        </div>
        <div style="margin-bottom:34px">
          <div class="settings-title">Organisation</div>
          <div class="card">
            <div class="review-row"><span class="review-key">Name</span><span class="review-val">Rewild Utah</span></div>
            <div class="review-row"><span class="review-key">Type</span><span class="review-val">Nonprofit</span></div>
            <div class="review-row">
              <span class="review-key">Discoverable by collaborators</span>
              <div style="display:flex;align-items:center;gap:10px">
                <span style="font-size:11px;color:var(--rg-text-3)">On</span>
                <div class="toggle-track" onclick="showToast('Discoverability setting updated')"><div class="toggle-thumb"></div></div>
              </div>
            </div>
          </div>
        </div>
        <div style="margin-bottom:34px">
          <div class="settings-title">Team members</div>
          <div class="card" style="padding:4px 22px">
            ${members.map(m=>`
              <div class="member-row">
                <div class="member-avatar" style="background:${m.bg};color:${m.tc}">${m.initials}</div>
                <div><div class="member-name">${m.name}</div><div class="member-email">${m.email}</div></div>
                <span class="member-role">${m.role}</span>
              </div>`).join('')}
          </div>
          <button class="btn" style="margin-top:14px" onclick="showToast('Invite sent!')">+ Invite member</button>
        </div>
        <div style="margin-bottom:34px">
          <div class="settings-title">Demo analysis</div>
          <div class="card">
            <p style="font-size:12px;color:var(--rg-text-3);line-height:1.7;margin-bottom:14px">Run the Schweizer et al. (2016) gray wolf demo again to explore the platform or share with colleagues. Limit: 1 demo per 24 hours.</p>
            <button class="btn" onclick="launchDemo()">🐺 Run wolf demo analysis</button>
          </div>
        </div>
        <div style="margin-bottom:34px">
          <div class="settings-title">Saved population labels</div>
          <div class="card" style="padding:0;overflow:hidden">
            <table class="popmap-table">
              <thead><tr><th>Label</th><th>Sample count</th><th>Last used</th><th></th></tr></thead>
              <tbody>${[['Yellowstone_N',12,'2d ago'],['Yellowstone_S',14,'2d ago'],['Idaho_W',10,'2d ago'],['Cascade_OR',12,'2d ago'],['Montana_E',8,'3w ago']].map(([l,c,w])=>`
                <tr><td style="font-weight:500;color:var(--rg-text)">${l}</td><td style="color:var(--rg-text-3)">${c}</td><td style="color:var(--rg-text-3)">${w}</td>
                <td><button class="btn btn-sm" onclick="showToast('Label deleted')">✕</button></td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>`;}

function render(){
  const main=document.getElementById('main-area');
  if(!main)return;
  const map={dashboard:renderDashboard,upload:renderUpload,'job-detail':renderJobDetail,settings:renderSettings,shared:renderShared};
  main.innerHTML=(map[state.page]||renderDashboard)();
}

function startUpload(){
  state.uploading=true;state.uploadPct=0;render();
  const iv=setInterval(()=>{
    state.uploadPct=Math.min(100,state.uploadPct+Math.floor(Math.random()*14)+4);
    const bar=document.getElementById('upload-bar');
    const pct=document.getElementById('upload-pct');
    if(bar)bar.style.width=state.uploadPct+'%';
    if(pct)pct.textContent=state.uploadPct+'% · Direct signed URL · not proxied through API';
    if(state.uploadPct>=100){clearInterval(iv);setTimeout(()=>{state.uploading=false;state.uploaded=true;render();},400);}
  },150);
}

function nextStep(){
  if(state.uploadStep===1&&!state.uploaded){startUpload();return;}
  if(state.uploadStep===5){showToast('Analysis JOB-005 queued — redirecting…');setTimeout(()=>navigate('job-detail','nav-job-004'),1200);return;}
  state.uploadStep++;render();
}

function toggleSample(id,checked){
  if(checked) state.selectedSamples.add(id);
  else state.selectedSamples.delete(id);
  render();
}

function toggleAllSamples(checked){
  if(checked) ALL_SAMPLES.forEach(s=>state.selectedSamples.add(s));
  else state.selectedSamples.clear();
  render();
}

function bulkAssign(pop){
  if(!pop||pop==='__new__'){showToast('Type a new population name to create it');return;}
  state.selectedSamples.forEach(s=>popMap[s]=pop);
  showToast(`${state.selectedSamples.size} samples → ${pop}`);
  state.selectedSamples.clear();
  render();
}

function launchDemo(){
  showToast('🐺 Launching wolf demo analysis — redirecting in ~2s…');
  setTimeout(()=>{
    state.demoDismissed=true;
    navigate('job-detail','nav-job-004');
  },1600);
}

function copyToClipboard(text){
  try {
    navigator.clipboard.writeText(text).then(()=>showToast('✓ Methods paragraph copied to clipboard'));
  } catch(e){
    showToast('Copy failed — select text manually');
  }
}

document.addEventListener('click',e=>{
  const nav=e.target.closest('.nav-item');
  if(nav&&nav.dataset.page) navigate(nav.dataset.page, nav.dataset.navid);
});

navigate('dashboard','nav-dashboard');
</script>
</body>
</html>
